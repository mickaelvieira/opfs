name: Release
on:
  release:
    types:
      - published

jobs:
  build:
    name: Release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # https://github.com/pnpm/action-setup?tab=readme-ov-file#install-only-pnpm-with-packagemanager
      - name: Install pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mickaelvieira'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Compile
        run: |
          pnpm compile

      - name: Bundle
        run: |
          pnpm bundle

      - name: Add package.json file
        run: cp package.json ./dist

      - name: Add README.md file
        run: cp README.md ./dist

      - run: pnpm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
